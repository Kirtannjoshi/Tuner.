name: Android Auto-Release Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Android Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug -PVERSION_CODE=${{ github.run_number }} -PVERSION_NAME=1.0.${{ github.run_number }}
      working-directory: android

    - name: Extract Version
      id: extract_version
      run: |
        echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

    - name: Deploy to GitHub Releases (Semantic)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ env.VERSION }}"
        name: "Tuner v${{ env.VERSION }}"
        make_latest: true
        files: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Prepare APK for Direct Hosting
      run: |
        mkdir -p web/public/download
        cp android/app/build/outputs/apk/debug/app-debug.apk web/public/download/tuner.apk

    - name: Mirror APK to Firebase Hosting (Direct Download)
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RADIOWAVE_7XXI7 }}'
        channelId: live
        projectId: radiowave-7xxi7
        entryPoint: ./web


